name: Build App Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app without signing
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild \
            -project arvos.xcodeproj \
            -scheme arvos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA artifact
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -name 'arvos.app' -type d | head -n 1)

          if [ -z "${APP_PATH}" ]; then
            echo "Could not find arvos.app in the build output"
            exit 1
          fi

          mkdir -p Payload
          cp -R "${APP_PATH}" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload arvos.ipa
          rm -rf Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arvos-app-artifact
          path: arvos.ipa